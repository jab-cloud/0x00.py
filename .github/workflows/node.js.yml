# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9
    - name: Install dependencies
      run: if [ -f package.json ]; then pnpm install; else echo "No package.json found, skipping pnpm install"; fi
    - name: Build
      run: if [ -f package.json ]; then pnpm run build --if-present; else echo "No package.json found, skipping build"; fi
    - name: Test
      run: if [ -f package.json ]; then pnpm test; else echo "No package.json found, skipping tests"; fi
